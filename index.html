<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALVAO — ROI Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1F3F8;
  --card:#fff;
  --text:#143763;--text2:#143763;--text3:#808191;--text4:#808191;
  --bd:#DFDFDF;--lt:#F1F3F8;
  --red:#E81123;--red-dk:#C40F1E;
  --blue:#1B4DCC;--blue-lt:#EFF4FF;
  --green:#1A7F4B;--green-lt:#ECFDF5;--green-bd:#A7F3D0;
  --orange:#B45309;--orange-lt:#FFFBEB;--orange-bd:#FCD34D;
  --teal:#0F766E;--teal-lt:#F0FDFA;--teal-bd:#99F6E4;
  --crimson:#9B1C1C;--crimson-lt:#FEF2F2;--crimson-bd:#FECACA;
  --purple:#6D28D9;--purple-lt:#F5F3FF;--purple-bd:#C4B5FD;
  --r:12px;--r-sm:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
  --sh-sm:0 1px 2px rgba(0,0,0,.05);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── APP SHELL ── */
.app-header{background:#fff;border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:57px}
.header-left{display:flex;align-items:center;gap:12px}
.header-right{display:flex;align-items:center;gap:8px}

.app-nav{background:transparent;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:40px;margin-top:8px}
.nav-left{display:flex;align-items:center;gap:6px}
.btn-retake{background:none;border:none;font-size:12.5px;color:var(--text4);cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px;transition:color .12s}
.btn-retake:hover{color:var(--text2)}
.nav-right{display:flex;align-items:center;gap:8px}
.cur-wrap{display:flex;align-items:stretch;gap:0;border-radius:var(--r-sm);overflow:hidden;box-shadow:0 1px 4px rgba(20,55,99,.12);border:1.5px solid #C8D8F0}
.cur-sel{background:#E8F0FB;border:none;border-radius:0;padding:8px 28px 8px 14px;font-size:13px;font-weight:600;color:#1B3F7A;cursor:pointer;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%235B7BA8' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 9px center;border-right:1.5px solid #C8D8F0}
.cur-sel:hover{background:#DBE9F8}
.export-btn{display:flex;align-items:center;gap:6px;background:var(--red);border:none;border-radius:0;padding:8px 18px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:all .12s}
.export-btn:hover{background:var(--red-dk)}

.wrap{max-width:1100px;margin:0 auto;padding:24px 24px 60px}

/* ── results top toolbar ── */
.results-toolbar{max-width:1100px;margin:0 auto;padding:18px 24px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.toolbar-actions{display:flex;align-items:center;gap:10px}

/* ── QUIZ ── */
.quiz-page{min-height:calc(100vh - 57px);display:flex;flex-direction:column;background:var(--bg)}
.quiz-hero{background:var(--hero-img,none),#F2F4F9;background-size:cover;background-position:center;padding:100px 32px 90px;text-align:center;position:relative;overflow:hidden;min-height:320px}
.quiz-hero-blob{display:none}
.quiz-hero-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;pointer-events:none;z-index:0}
.quiz-hero-title{font-size:clamp(26px,4vw,40px);font-weight:600;color:#143763;line-height:1.15;letter-spacing:-0.02em;margin-bottom:12px;position:relative;z-index:1}
.quiz-hero-sub{font-size:14px;color:#143763;line-height:1.6;max-width:420px;margin:0 auto;position:relative;opacity:.7;z-index:1}
.quiz-body{flex:1;padding:0 24px 64px;max-width:680px;width:100%;margin:0 auto}
.quiz-segs-wrap{display:flex;justify-content:center;align-items:center;background:#fff;padding:20px 48px;border-bottom:1px solid #DFDFDF;width:100vw;position:relative;left:50%;transform:translateX(-50%)}
.quiz-card{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:36px 40px;box-shadow:0 2px 12px rgba(0,0,0,.05);position:relative}
.quiz-card-title{font-size:22px;font-weight:700;color:#1a2b4a;margin-bottom:6px;text-align:center}
.quiz-card-sub{font-size:13px;color:var(--text4);margin-bottom:28px;text-align:center}
.quiz-segs{display:flex;gap:5px;width:100%;max-width:500px;padding:0}
.quiz-seg{flex:1;height:3px;border-radius:2px;background:#DFDFDF;transition:background .35s ease}
.quiz-seg.done{background:#E81123}
.quiz-seg.active{background:#E81123;opacity:.5}
.quiz-content{display:flex;flex-direction:column;width:100%;max-width:600px;padding:0 32px;flex:1;justify-content:center;padding-top:32px;padding-bottom:80px}
.quiz-qlbl{font-size:11.5px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;opacity:0;animation:fadeUp .35s ease forwards}
.quiz-qh{font-size:clamp(22px,3.5vw,32px);font-weight:700;color:var(--text);line-height:1.2;letter-spacing:-.4px;margin-bottom:10px;opacity:0;animation:fadeUp .35s .05s ease forwards}
.quiz-qhint{font-size:14px;color:var(--text4);line-height:1.65;margin-bottom:30px;max-width:460px;opacity:0;animation:fadeUp .35s .1s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.quiz-nbox{display:flex;align-items:center;border:2px solid var(--bd);border-radius:10px;padding:16px 20px;background:#fff;width:100%;gap:14px;transition:border-color .15s,box-shadow .15s;margin-bottom:14px;cursor:text;opacity:0;animation:fadeUp .35s .15s ease forwards}
.quiz-nbox:focus-within{border-color:var(--red);box-shadow:0 0 0 4px rgba(214,63,63,.07)}
.quiz-nbox.has-err{border-color:var(--red);box-shadow:0 0 0 4px rgba(214,63,63,.1)}
.quiz-ninput{flex:1;font-size:34px;font-weight:700;font-family:'IBM Plex Mono',monospace;border:none;outline:none;background:transparent;color:var(--text);min-width:0;-moz-appearance:textfield}
.quiz-ninput::placeholder{color:#D1D5DB}
.quiz-ninput::-webkit-inner-spin-button,.quiz-ninput::-webkit-outer-spin-button{display:none}
.quiz-nunit{display:flex;align-items:center;gap:7px;flex-shrink:0}
.quiz-narr-col{display:flex;flex-direction:column;gap:5px;align-items:center}
.quiz-narr{background:none;border:none;cursor:pointer;color:var(--text3);padding:1px 3px;line-height:1;font-size:8px;display:flex;align-items:center;transition:color .1s}
.quiz-narr:hover{color:var(--text2)}
.quiz-nulbls{display:flex;flex-direction:column;gap:1px}
.quiz-nulbl{font-size:12px;font-weight:600;color:var(--text3);white-space:nowrap;line-height:1.4}
.quiz-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;opacity:0;animation:fadeUp .35s .2s ease forwards}
.quiz-pill{padding:6px 16px;border:1.5px solid var(--bd);border-radius:999px;font-size:13px;font-weight:500;color:var(--text4);background:#fff;cursor:pointer;transition:all .12s;font-family:'IBM Plex Mono',monospace;letter-spacing:-.2px}
.quiz-pill:hover{border-color:var(--red);color:var(--red);background:#FFF5F5}
.quiz-pill.sel{border-color:var(--red);color:var(--red);background:#FFF5F5}
.quiz-err-msg{font-size:12px;color:var(--red);min-height:16px;margin-bottom:10px;opacity:0;transition:opacity .15s}
.quiz-err-msg.visible{opacity:1}
.quiz-btn-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:24px;opacity:0;animation:fadeUp .35s .25s ease forwards}
.quiz-confirm-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:background .12s,transform .08s,box-shadow .12s;box-shadow:0 2px 8px rgba(214,63,63,.25)}
.quiz-confirm-btn:hover{background:var(--red-dk);transform:translateY(-1px);box-shadow:0 4px 14px rgba(214,63,63,.30)}
.quiz-confirm-btn:active{transform:translateY(0);box-shadow:none}
.quiz-back-btn-inline{background:#F3F4F6;border:none;border-radius:10px;padding:14px 22px;font-size:14px;font-weight:500;color:var(--text4);cursor:pointer;font-family:inherit;transition:background .12s,color .12s}
.quiz-back-btn-inline:hover{background:#E5E7EB;color:var(--text2)}
.quiz-sector-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;opacity:0;animation:fadeUp .35s .15s ease forwards}
@media(max-width:420px){.quiz-sector-grid{grid-template-columns:1fr}}
.quiz-sector-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #DFDFDF;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;transition:all .12s;text-align:left}
.quiz-sector-card:hover{border-color:var(--red);background:#FFF5F5}
.quiz-sector-card.sel{border-color:var(--red);background:#FFF5F5}
.quiz-sector-icon{font-size:22px;flex-shrink:0}
.quiz-sector-lbl{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
.quiz-sector-desc{font-size:10.5px;color:var(--text3);margin-top:2px;line-height:1.4}

/* ── RESULTS LAYOUT ── */
.results-layout{display:grid;grid-template-columns:210px 1fr;gap:16px;align-items:start;border-radius:var(--r);overflow:visible;box-shadow:none}
@media(max-width:720px){.results-layout{grid-template-columns:1fr}}

/* ── MOBILNÍ RESPONZIVITA VÝSLEDKŮ (≤600px) ── */
@media(max-width:600px){
  /* wrap */
  .wrap{padding:12px 12px 40px}
  .results-toolbar{padding:12px 12px 0;flex-wrap:wrap;gap:8px}
  .btn-retake{font-size:12px}

  /* layout: sidebar nahoře, main pod ním */
  .results-layout{grid-template-columns:1fr;gap:10px}
  .sidebar{border-radius:var(--r);border:1px solid var(--bd)}
  .main-col{padding:12px;gap:10px;border-radius:var(--r)}

  /* hero card */
  .hero-card{padding:20px 16px}
  .hero-numbers{flex-wrap:wrap;justify-content:center;gap:6px}
  .hero-num-low,.hero-num-high{font-size:1.8rem}
  .hero-dash{font-size:1.4rem}
  .hero-pill{font-size:12px}
  .hero-note{font-size:11px;text-align:center}

  /* confidence row */
  .roi-row{flex-direction:column;border-radius:var(--r-sm)}
  .roi-item{padding:10px 12px;border-right:none!important;border-bottom:1px solid var(--bd)}
  .roi-item:last-child{border-bottom:none}
  .roi-item-lbl{font-size:13px}
  .roi-item-pct{font-size:16px}

  /* payback + chart karta */
  .card{padding:20px 16px}
  .pb-card-head{flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:12px}
  .pb-card-head .pb-heading{font-size:18px;white-space:normal}
  .pb-card-head .pb-num{font-size:32px}
  .sg-heading{font-size:18px}

  /* financial impact tabulka - scroll místo squeeze */
  .fi-heading{font-size:18px;margin-bottom:12px}
  .card:has(#fi-tbl){padding:20px 0 20px 16px;overflow:hidden}
  .ba-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-right:16px}
  .ba-tbl{font-size:12px;min-width:420px}
  .ba-tbl th{font-size:11px;padding:0 8px 10px;white-space:nowrap}
  .ba-tbl th:first-child{padding-left:0}
  .ba-tbl td{padding:9px 8px;font-size:12px}
  .ba-tbl td:first-child{padding-left:0;font-size:12px;min-width:140px}
  .ba-tbl tr.section-row td{font-size:10.5px;padding-top:14px}
  .bm{font-size:9.5px;line-height:1.6;padding-right:16px}

  /* CTA */
  .cta{padding:28px 20px 36px;border-radius:var(--r-sm)}
  .cta-title{font-size:17px}
  .cta-sub{font-size:13px}
  .cta-btn{padding:12px 20px;font-size:13px}
}

/* ── SIDEBAR ── */
.sidebar{background:#F7F9FC;border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh-sm);align-self:start}
.sb-section-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px}
.sb-sector-badge{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#FFF5F5;border:1px solid #F6C9CC;border-radius:var(--r-sm);margin-bottom:14px;font-size:12px;font-weight:600;color:var(--red)}
.sb-sector-badge .sbi{font-size:14px}
.ig{margin-bottom:10px}
.ig:last-child{margin-bottom:0}
.ig label{display:block;font-size:11px;font-weight:500;color:var(--text4);margin-bottom:4px}
.ig-row{display:flex;align-items:center;gap:0;border:1px solid #DFDFDF;border-radius:4px;overflow:hidden;background:#fff}
.ig-row:focus-within{border-color:var(--red)}
.ig input[type=number]{flex:1;padding:7px 8px;border:none;font-size:12.5px;font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--text);background:transparent;outline:none;-moz-appearance:textfield;min-width:0}
.ig input[type=number]::-webkit-inner-spin-button{opacity:.3}
.ig-sfx{font-size:11px;color:var(--text3);padding:0 8px 0 0;white-space:nowrap;background:transparent;font-weight:500}

.tune-divider{height:1px;background:var(--bd);margin:14px 0}
.tune-block{background:#FAFBFC;border:1.5px solid #E4E8EF;border-radius:var(--r-sm);overflow:hidden}
.tune-header{display:flex;align-items:flex-start;gap:8px;padding:10px 11px;cursor:pointer;user-select:none}
.tune-header-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.tune-header-text{}
.tune-header-title{font-size:11.5px;font-weight:700;color:var(--text2)}
.tune-header-desc{font-size:10px;color:var(--text3);line-height:1.45;margin-top:2px}
.tune-chevron{margin-left:auto;color:var(--text3);flex-shrink:0;transition:transform .2s}
.tune-chevron.open{transform:rotate(180deg)}
.tune-body{display:none;padding:0 11px 11px;border-top:1px solid #E4E8EF}
.tune-body.open{display:block}
.tune-body .ig{margin-top:10px;margin-bottom:0}
.tune-body .ig:not(:last-child){margin-bottom:8px}
.tune-body .ig-row{background:#fff}
.tune-body .ig label{color:var(--text4);opacity:1}
.tune-body .ig select{width:100%;padding:7px 28px 7px 8px;border:none;font-size:11.5px;font-family:'IBM Plex Sans',sans-serif;font-weight:500;color:var(--text);background:transparent;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239CA3AF' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}
.ig-row-select{border:1.5px solid var(--bd);border-radius:var(--r-sm);background:#fff;overflow:hidden}
.ig-row-select:focus-within{border-color:var(--red)}
.mat-impact{margin-top:5px;font-size:10px;padding:4px 8px;border-radius:5px;line-height:1.4;font-weight:500}
.mat-impact.unset{background:rgba(255,255,255,.7);color:var(--text3);border:1px dashed #D4DEF5}
.mat-impact.low{background:#FEF9EC;color:#92400e;border:1px solid #FDE68A}
.mat-impact.med{background:#fff;color:#1e3a8a;border:1px solid #bcd0f7}
.mat-impact.high{background:var(--green-lt);color:#14532d;border:1px solid var(--green-bd)}
.tune-subsection-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--crimson);margin:12px 0 6px;display:flex;align-items:center;gap:5px}
.tune-body .bc-inp{background:#FFF5F5!important}
.bc-preview{margin-top:5px;font-size:10px;padding:4px 8px;border-radius:5px;line-height:1.4;font-weight:500;background:var(--crimson-lt);color:var(--crimson);border:1px solid var(--crimson-bd);display:none}
.bc-preview.visible{display:block}
.jml-preview{margin-top:5px;font-size:10px;padding:4px 8px;border-radius:5px;line-height:1.4;font-weight:500;background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);display:none}
.jml-preview.visible{display:block}

/* ── MAIN COLUMN ── */
.main-col{display:flex;flex-direction:column;gap:14px;padding:16px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh-sm);min-width:0}

.results-hero{
  background:var(--hero-img,linear-gradient(180deg,rgba(242,244,249,0) 92%,#F2F4F9 98%)),#F2F4F9;
  background-size:cover;background-position:center top;
  padding:56px 32px 48px;text-align:center;position:relative;overflow:hidden;
  border-bottom:1px solid #DFDFDF;width:100vw;margin-left:calc(-50vw + 50%);margin-bottom:0;
}
.results-hero-title{font-size:clamp(28px,3.5vw,48px);font-weight:600;color:#143763;line-height:1.15;letter-spacing:-0.02em;margin-bottom:8px;position:relative;z-index:1}
.results-hero-sub{font-size:16px;color:#143763;line-height:1.5;position:relative;z-index:1}
.hero-card{background:#FFFFFF;border:1px solid #DFDFDF;border-radius:16px;padding:40px 40px 32px;text-align:center}
.hero-pill{display:inline-flex;align-items:center;background:#F1F3F8;border:1px solid #DFDFDF;border-radius:20px;padding:4px 14px;font-size:14px;font-weight:400;color:#808191;letter-spacing:.07em;text-transform:uppercase;margin-bottom:16px}
.hero-numbers{display:flex;align-items:baseline;justify-content:center;gap:16px;margin-bottom:20px}
.hero-num-low{font-size:3rem;font-weight:600;font-family:'IBM Plex Sans',sans-serif;letter-spacing:-0.02em;color:#808191}
.hero-num-high{font-size:3rem;font-weight:600;font-family:'IBM Plex Sans',sans-serif;letter-spacing:-0.02em;color:#143763}
.hero-dash{font-size:2rem;font-weight:300;color:#DFDFDF;flex-shrink:0}
.hero-note{font-size:12.5px;color:var(--text3);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px}

.roi-row{display:flex;gap:0;border:1px solid #DFDFDF;border-radius:8px;overflow:hidden;margin-bottom:16px;background:#fff}
.roi-item{flex:1;padding:14px 6px;text-align:center;position:relative;cursor:pointer}
.roi-item:not(:last-child){border-right:1.5px solid var(--bd)}
.roi-item.active{background:#F2F5F9;border-bottom:2px solid #143763}
.roi-item-lbl{font-size:14px;font-weight:400;text-transform:none;letter-spacing:0;color:#808191;margin-bottom:6px}
.roi-item.active .roi-item-lbl{color:var(--text4)}
.roi-item-pct{font-size:17px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;letter-spacing:0;line-height:1}
.roi-item-sub{font-size:9.5px;color:var(--text3);margin-top:2px;display:none}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:40px;box-shadow:var(--sh-sm)}
.card-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:14px}

/* Payback + Savings Growth headings styled large like screenshot */
.pb-card-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px}
.pb-card-head .pb-heading{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.3px;white-space:nowrap}
.pb-card-head .pb-num-inline{display:flex;align-items:baseline;gap:6px}
.pb-card-head .pb-num{font-size:42px;font-weight:700;color:var(--red);line-height:1;font-family:'IBM Plex Sans',sans-serif}
.pb-card-head .pb-num-unit{font-size:14px;color:var(--text3);font-weight:500}
.sg-heading{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.3px;margin-bottom:8px}

<body>
<div id="root"></div>
<script>
// ── KONFIGURACE OBRÁZKŮ ──────────────────────────────────────────────────────
// Hero banner (dotazník i výsledky). Soubor lež vedle index.html. Prázdné = bez obrázku.
const HERO_IMAGE_URL='hero.png';

// ── CURRENCY ─────────────────────────────────────────────────────────────────
const CUR={
  USD:{rate:1,   locale:'en-US',sym:'$'},
  EUR:{rate:0.92,locale:'de-DE',sym:'€'},
  GBP:{rate:0.79,locale:'en-GB',sym:'£'},
  CZK:{rate:23.5,locale:'cs-CZ',sym:'Kč'},
};
function fmt(usd){
  const c=CUR[S.cur],v=usd*c.rate;
  if(S.cur==='CZK')return Math.round(v).toLocaleString('cs-CZ')+'\u202fKč';
  return new Intl.NumberFormat(c.locale,{style:'currency',currency:S.cur,maximumFractionDigits:0}).format(v);
}
function fmtAx(usd){
  const v=usd*CUR[S.cur].rate;
  if(v>=1e6)return (v/1e6).toFixed(1)+'M';
  if(v>=1e3)return Math.round(v/1e3)+'K';
  return Math.round(v).toString();
}
function fmtPill(val,isHourly){
  if(isHourly){
    const sym=CUR[S.cur].sym;
    if(S.cur==='CZK') return Math.round(val)+' Kč';
    return sym+val;
  }
  return val.toLocaleString('en-US').replace(/,/g,' ');
}

// ── ALVAO PRICING (USD, list price before discount) ──
const ALVAO_AGENT_LIST_USD  = 63;
const ALVAO_DEVICE_LIST_USD = 2.25;
const ALVAO_DISCOUNT        = 0.30;
const ALVAO_AGENT_USD  = ALVAO_AGENT_LIST_USD  * (1 - ALVAO_DISCOUNT);
const ALVAO_DEVICE_USD = ALVAO_DEVICE_LIST_USD * (1 - ALVAO_DISCOUNT);

// ── MATURITY LEVELS ──
const MATURITY_LEVELS=[
  {val:1.01,lbl:'Low – Reactive (no processes, no CMDB)',cls:'low',note:'RF ×1.01 · basic adoption · +1% uplift'},
  {val:1.17,lbl:'Medium – Standardized (defined processes)',cls:'med',note:'RF ×1.17 · standard adoption · +17% uplift'},
  {val:1.34,lbl:'High – Optimized (automation, governance)',cls:'high',note:'RF ×1.34 · full adoption · +34% uplift'},
];
function getMaturityCfg(val){
  if(val===null||val===undefined||val==='')
    return{val:null,lbl:'Not specified',cls:'unset',note:'RF not applied — base estimate.'};
  return MATURITY_LEVELS.find(m=>m.val===val)||MATURITY_LEVELS[1];
}
function getMttrReduction(maturityVal){
  if(maturityVal===1.01)return 0.35;
  if(maturityVal===1.34)return 0.10;
  return 0.20;
}

// ── SECTOR CONFIG ──
const SECTORS={
  Finance:{icon:'🏦',label:'Finance',desc:'Banks, insurance, fintech',
    modifiers:{itsm:0.97,lic:0.99,inv:1.02,itam:0.98},unusedLicDefault:35,
    tierSplit:{l1:0.70,l2:0.22,l3:0.08},
    insight:'Strict regulatory audits drive high SAM savings.'},
  Manufacturing:{icon:'🏭',label:'Manufacturing',desc:'Industrial, OT/IT environments',
    modifiers:{itsm:0.90,lic:0.71,inv:1.27,itam:1.19},unusedLicDefault:25,
    tierSplit:{l1:0.68,l2:0.23,l3:0.09},
    insight:'Large hardware asset fleets create extreme inventory overhead.'},
  Public:{icon:'🏛️',label:'Public Sector',desc:'Government, municipalities',
    modifiers:{itsm:1.05,lic:0.61,inv:0.85,itam:0.94},unusedLicDefault:20,
    tierSplit:{l1:0.75,l2:0.18,l3:0.07},
    insight:'Legacy processes mean the largest ITSM efficiency jumps.'},
  Nonprofit:{icon:'🤝',label:'Nonprofit',desc:'NGOs, charities, foundations',
    modifiers:{itsm:0.82,lic:0.44,inv:0.72,itam:0.68},unusedLicDefault:15,
    tierSplit:{l1:0.80,l2:0.15,l3:0.05},
    insight:'Every dollar reclaimed has high budget impact in lean organizations.'},
  Tech:{icon:'💻',label:'Tech',desc:'SaaS, IT services, software',
    modifiers:{itsm:0.82,lic:0.85,inv:0.72,itam:0.85},unusedLicDefault:30,
    tierSplit:{l1:0.60,l2:0.28,l3:0.12},
    insight:'Small efficiency gains compound significantly for senior engineers.'},
  Retail:{icon:'🛒',label:'Retail',desc:'E-commerce, brick & mortar',
    modifiers:{itsm:0.99,lic:0.99,inv:0.85,itam:1.02},unusedLicDefault:35,
    tierSplit:{l1:0.82,l2:0.13,l3:0.05},
    insight:'High turnover generates enormous onboarding/offboarding ticket volume.'},
  Healthcare:{icon:'🏥',label:'Healthcare',desc:'Hospitals, clinics, pharma',
    modifiers:{itsm:0.92,lic:0.71,inv:1.02,itam:1.11},unusedLicDefault:25,
    tierSplit:{l1:0.72,l2:0.20,l3:0.08},
    insight:'Device availability is mission-critical.'},
};

// ── CONFIDENCE LEVELS ──
const CONFIDENCE={
  low:{label:'Conservative',itsmMult:0.80,licMult:0.75,invMult:0.75,itamMult:0.75,
    ramp:[0.15,0.50,0.80,1.00,1.07],color:'#94A3B8',bcMult:0.80,
    desc:'Cautious adoption, partial rollout, limited change management'},
  med:{label:'Realistic',itsmMult:1.00,licMult:1.00,invMult:1.00,itamMult:1.00,
    ramp:[0.15,0.50,0.80,1.00,1.07],color:'#1B4DCC',bcMult:1.00,
    desc:'Standard ALVAO deployment with active change management'},
  high:{label:'Optimistic',itsmMult:1.30,licMult:1.40,invMult:1.45,itamMult:1.45,
    ramp:[0.15,0.50,0.80,1.00,1.07],color:'#1A7F4B',bcMult:1.40,
    desc:'Full adoption, strong governance, proactive optimization (Forrester upper quartile)'},
};

// ── QUIZ ──
const HOURLY_DEF={USD:35,EUR:32,GBP:30,CZK:550};
const HOURLY_QUICK={
  USD:[20,30,35,50,70,95],
  EUR:[18,25,32,45,65,85],
  GBP:[16,22,30,42,60,80],
  CZK:[300,400,550,750,1000,1400],
};

const QS=[
  {id:'segment',type:'sector',cat:'Industry',
    q:'What industry is your organization in?',
    hint:'Your sector determines benchmark multipliers for ITSM efficiency and license waste.'},
  {id:'users',type:'number',cat:'Team size',
    q:'How many employees does your organization have?',
    hint:'Total headcount. Used to calculate End-User Productivity savings.',
    unit:'people',quickPicks:[50,200,500,800,1000,2000,5000],inpStep:10,min:1},
  {id:'agents',type:'number',cat:'Support team',
    q:'How many IT help desk staff do you have?',
    hint:'Resolvers who handle tickets — L1, L2, and L3 combined.',
    unit:'staff',quickPicks:[2,5,10,20,50],inpStep:1,min:1},
  {id:'monthlyTickets',type:'number',cat:'Support load',
    q:'How many tickets does your team handle per month?',
    hint:'Average monthly volume of IT support tickets across all channels.',
    unit:'tickets / month',quickPicks:[500,750,1000,1800,3500,6000],inpStep:50,min:1},
  {id:'hourlyCost',type:'hourly',cat:'Agent cost',
    q:'What is the fully-loaded hourly cost per IT agent?',
    hint:'Include salary, benefits, overhead. If unsure, use gross annual salary ÷ working hours (≈1 760 hrs/yr).',
    inpStep:1,min:1},
  {id:'endpoints',type:'number',cat:'Asset inventory',
    q:'How many devices does IT manage?',
    hint:'Desktops, laptops, servers, mobile devices — everything under IT\'s management.',
    unit:'devices',quickPicks:[200,500,850,2000,5000],inpStep:50,min:0},
];

// ── STATE ──
let S={
  cur:'USD',phase:'quiz',step:0,confidence:'med',err:'',tuneOpen:true,
  inp:{
    segment:'',users:'',agents:'',hourlyCost:'',
    monthlyTickets:'',emailTickets:50,endpoints:'',
    inventoryHours:0,maturity:null,ticketRatio:null,
    onboardingVolume:'',majorIncidents:'',hourlyDowntimeCost:'',
  }
};

// ── COMPUTE ──
function computeFor(conf){
  const a=S.inp;
  const seg=a.segment||'Tech';
  const segCfg=SECTORS[seg]||SECTORS['Tech'];
  const m=segCfg.modifiers;
  const cl=CONFIDENCE[conf];
  const users=Math.max(1,parseFloat(a.users)||350);
  const agents=Math.max(1,parseFloat(a.agents)||5);

  const hcInCur=Math.max(1,parseFloat(a.hourlyCost)||HOURLY_DEF[S.cur]);
  const hrRate=hcInCur/CUR[S.cur].rate;

  const emailPct=Math.max(0,Math.min(100,parseFloat(a.emailTickets)||50));
  const invHrs=Math.max(0,parseFloat(a.inventoryHours)||0);
  const endpts=Math.max(0,parseFloat(a.endpoints)||0);
  const inputTickets=parseFloat(a.monthlyTickets)||0;
  const storedRatio=parseFloat(a.ticketRatio)||0.5;
  const mTix=Math.max(1,inputTickets>0?inputTickets:users*storedRatio);
  const ticketsDynamic=(inputTickets===0);

  const PRF=conf==='low'?0.08:conf==='high'?0.16:0.10;

  const maturitySet=(a.maturity!==null&&a.maturity!==undefined&&a.maturity!=='');
  const maturityRF=maturitySet?parseFloat(a.maturity):1.0;
  const matCfg=getMaturityCfg(maturitySet?a.maturity:null);

  const tier=segCfg.tierSplit;
  const l1adj=agents<5?Math.min(tier.l1+0.10,0.90):tier.l1;
  const l2adj=agents<5?tier.l2*0.75:tier.l2;
  const l3adj=Math.max(0,1-l1adj-l2adj);

  const avgHandleMin=20*l1adj+40*l2adj+75*l3adj;
  const directCPT=(avgHandleMin/60)*hrRate;
  const avgCPT=directCPT*1.30;

  const annTix=mTix*12;
  const annTicketCost=annTix*avgCPT;

  const itsmBase=conf==='low'?0.15:conf==='high'?0.28:0.20;
  const itsmGain=Math.min(itsmBase*m.itsm,0.60);
  const totalAgentCostAnn=agents*hrRate*1760;
  const ticketTimeFraction=0.65;
  const itsmSavings=totalAgentCostAnn*ticketTimeFraction*itsmGain*maturityRF;

  const avgWaitHrs=l1adj*1.5+l2adj*4.0+l3adj*10.0;
  const waitReduction=conf==='low'?0.25:conf==='high'?0.45:0.35;
  const endUserHrRate=hrRate*0.65;
  const ticketsPerUser=annTix/users;
  const userProductivityROI=users*ticketsPerUser*avgWaitHrs*waitReduction*endUserHrRate*PRF*maturityRF;

  const channelSavings=annTix*(emailPct/100)*0.40*(
    (22/60)*hrRate-(12/60)*hrRate
  )*m.itsm*cl.itsmMult*PRF*maturityRF;

  const unusedLicPct=conf==='low'?8:conf==='high'?18:12;
  const unusedLicCount=users*(unusedLicPct/100);
  const licWaste=unusedLicCount*120;
  const licRecovery=Math.min(0.78*m.lic*cl.licMult,0.90);
  const licSavings=licWaste*licRecovery*maturityRF;

  const annualDeviceCost=1200;
  const itamRate=conf==='low'?0.015:conf==='high'?0.040:0.025;
  const itamSavings=endpts*annualDeviceCost*itamRate*m.itam*cl.itamMult*maturityRF;

  const invLaborUSD=invHrs*12*hrRate;
  const invRecovery=Math.min(0.65*m.inv*cl.invMult,0.85);
  const invSavings=invLaborUSD*invRecovery*PRF*maturityRF;

  const onboardingVolumeRaw=parseFloat(a.onboardingVolume);
  const onboardingIsAuto=(isNaN(onboardingVolumeRaw)||a.onboardingVolume==='');
  const onboardingVolume=onboardingIsAuto?Math.round(users*0.15):Math.max(0,onboardingVolumeRaw);
  const jmlEvents=onboardingVolume*2;
  const jmlAdminMult=conf==='low'?0.70:conf==='high'?1.20:1.00;
  const jmlAdminSavings=jmlEvents*2.5*hrRate*jmlAdminMult*maturityRF;
  const jmlProductivitySavings=onboardingVolume*6*endUserHrRate*PRF*maturityRF;
  const onboardingTotal=jmlAdminSavings+jmlProductivitySavings;

  const majorIncidentsRaw=parseFloat(a.majorIncidents);
  const hourlyDowntimeCostRaw=parseFloat(a.hourlyDowntimeCost);
  const bcActive=(!isNaN(majorIncidentsRaw)&&majorIncidentsRaw>0&&!isNaN(hourlyDowntimeCostRaw)&&hourlyDowntimeCostRaw>0);
  const majorIncidents=bcActive?majorIncidentsRaw:0;
  const hourlyDowntimeCostUSD=bcActive?(hourlyDowntimeCostRaw/CUR[S.cur].rate):0;
  const avgIncidentDuration=4;
  const mttrReduction=getMttrReduction(maturitySet?parseFloat(a.maturity):null);
  const downtimeSavings=bcActive?majorIncidents*avgIncidentDuration*hourlyDowntimeCostUSD*mttrReduction*cl.bcMult*maturityRF:0;
  const totalDowntimeCostBefore=bcActive?majorIncidents*avgIncidentDuration*hourlyDowntimeCostUSD:0;
  const totalDowntimeCostAfter=totalDowntimeCostBefore-downtimeSavings;

  const annSavings=itsmSavings+userProductivityROI+channelSavings+licSavings+itamSavings+invSavings+onboardingTotal+downtimeSavings;

  const agentsForPricing=agents;
  const alvaoAnn=agentsForPricing*ALVAO_AGENT_USD*12 + endpts*ALVAO_DEVICE_USD*12;
  const alvaoImpl=alvaoAnn*0.40;

  const ramp=[0.15,0.50,0.80,1.00,1.07];
  const annualAgentCostUSD=hrRate*1760;
  const maintenanceCost=alvaoAnn*0.20;
  const adminOverheadCost=annualAgentCostUSD*0.25;
  const yrData=ramp.map((r,i)=>({yr:i+1,sav:annSavings*r,cost:alvaoAnn+maintenanceCost+adminOverheadCost+(i===0?alvaoImpl:0)}));
  const cum5sav=yrData.reduce((s,y)=>s+y.sav,0);
  const cum5cost=yrData.reduce((s,y)=>s+y.cost,0);
  const roi5=cum5cost>0?(cum5sav-cum5cost)/cum5cost*100:0;
  const payback=annSavings*ramp[0]>0?Math.min(60,Math.ceil((alvaoAnn+alvaoImpl)/(annSavings*ramp[0]/12))):99;

  return{
    conf,hrRate,hcInCur,
    l1adj,l2adj,l3adj,avgHandleMin,
    avgCPT,avgCPTAfter:avgCPT*(1-itsmGain),
    annTix,annTicketCost,annTicketCostAfter:annTicketCost*(1-itsmGain),
    totalAgentCostAnn,totalAgentCostAnnAfter:totalAgentCostAnn*(1-itsmGain),

// ── SVG CHART ──
function mkChart(r){
  const bars=[...r.yrData.map(y=>({lbl:'Year '+y.yr,val:y.sav,tot:false})),
               {lbl:'Total',val:r.cum5sav,tot:true}];
  const maxV=Math.max(...bars.map(b=>b.val))*1.2||1;
  const W=340,H=160,pL=44,pR=8,pT=16,pB=28;
  const cW=W-pL-pR,cH=H-pT-pB;
  const slot=cW/bars.length,bW=slot*0.54;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.style.cssText='width:100%;height:auto;display:block;overflow:visible';
  for(let i=0;i<=4;i++){
    const v=maxV*i/4,y=pT+cH*(1-i/4);
    const ln=document.createElementNS(ns,'line');
    ln.setAttribute('x1',pL);ln.setAttribute('x2',W-pR);ln.setAttribute('y1',y);ln.setAttribute('y2',y);
    ln.setAttribute('stroke',i===0?'#CBD5E1':'#F1F5F9');ln.setAttribute('stroke-width','1');svg.appendChild(ln);
    if(i>0){
      const tl=document.createElementNS(ns,'text');
      tl.setAttribute('x',pL-4);tl.setAttribute('y',y+3);tl.setAttribute('text-anchor','end');
      tl.setAttribute('font-size','8');tl.setAttribute('fill','#9CA3AF');
      tl.setAttribute('font-family','IBM Plex Mono,monospace');tl.textContent=fmtAx(v);svg.appendChild(tl);
    }
  }
  const barColor='#143763';
  bars.forEach((b,i)=>{
    const bH=Math.max(2,(b.val/maxV)*cH);
    const x=pL+i*slot+(slot-bW)/2,y=pT+cH-bH;
    const fill=b.tot?'#E81123':barColor;
    const rect=document.createElementNS(ns,'rect');
    rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',bW);rect.setAttribute('height',bH);
    rect.setAttribute('rx','3');rect.setAttribute('fill',fill);
    svg.appendChild(rect);
    if(b.val>maxV*0.06){
      const vt=document.createElementNS(ns,'text');
      vt.setAttribute('x',x+bW/2);vt.setAttribute('y',y-3);vt.setAttribute('text-anchor','middle');
      vt.setAttribute('font-size','7.5');vt.setAttribute('fill',fill);
      vt.setAttribute('font-family','IBM Plex Mono,monospace');vt.setAttribute('font-weight','600');
      vt.textContent=fmtAx(b.val);svg.appendChild(vt);
    }
    const xl=document.createElementNS(ns,'text');
    xl.setAttribute('x',x+bW/2);xl.setAttribute('y',H-pB+12);xl.setAttribute('text-anchor','middle');
    xl.setAttribute('font-size','8');xl.setAttribute('fill','#9CA3AF');
    xl.setAttribute('font-family','IBM Plex Sans,sans-serif');xl.textContent=b.lbl;svg.appendChild(xl);
  });
  return svg;
}

function mkQuizPage(){

    if(c===S.cur)o.selected=true;curSel.appendChild(o);
  });

    const old=S.cur;S.cur=e.target.value;
    if(S.inp.hourlyCost!==''&&S.inp.hourlyCost!==null){
      S.inp.hourlyCost=Math.round((parseFloat(S.inp.hourlyCost)/CUR[old].rate)*CUR[S.cur].rate);

    render();
  };

  segsWrap.appendChild(curBar);



  const card=el('div','quiz-card');
  const content=el('div');
  const qh=tx('div','quiz-qh',q.q);
  qh.style.textAlign='center';
  content.appendChild(qh);
  if(q.hint){
    const qhint=tx('div','quiz-qhint',q.hint);

    content.appendChild(qhint);
  }

  const errMsg=tx('div','quiz-err-msg',S.err||'');

  if(q.type==='sector'){
    const grid=el('div','quiz-sector-grid');
    Object.entries(SECTORS).forEach(([key,cfg])=>{
      const scard=el('button','quiz-sector-card');
      if(S.inp.segment===key)scard.classList.add('sel');
      const icon=tx('span','quiz-sector-icon',cfg.icon);
      const info=el('div');
      info.appendChild(tx('div','quiz-sector-lbl',cfg.label));
      info.appendChild(tx('div','quiz-sector-desc',cfg.desc));
      scard.appendChild(icon);scard.appendChild(info);
      scard.onclick=()=>{
        S.inp.segment=key;S.err='';
        document.querySelectorAll('.quiz-sector-card').forEach(c=>c.classList.remove('sel'));
        scard.classList.add('sel');
        const em=document.getElementById('quiz-err-msg');
        if(em){em.textContent='';em.classList.remove('visible');}
      };
      grid.appendChild(scard);
    });
    content.appendChild(grid);
    content.appendChild(errMsg);
  } else {
    const isHourly=(q.type==='hourly');
    const unitStr=isHourly?(CUR[S.cur].sym+' / hour'):(q.unit||'');
    const unitParts=unitStr.includes('/')?[
      unitStr.split('/')[0].trim()+' /',
      unitStr.split('/')[1].trim()
    ]:[unitStr];

    const nbox=el('div','quiz-nbox');
    nbox.onclick=()=>{const inp=nbox.querySelector('.quiz-ninput');if(inp)inp.focus();};

    const ninput=document.createElement('input');
    ninput.type='number';
    ninput.className='quiz-ninput';
    ninput.id='quiz-number-input';
    ninput.min=q.min!==undefined?q.min:0;
    if(q.max!==undefined)ninput.max=q.max;
    ninput.step=q.inpStep||1;

    const curVal=S.inp[q.id];
    if(curVal!==''&&curVal!==null&&curVal!==undefined){
      ninput.value=curVal;
    } else {
      if(isHourly) ninput.placeholder=HOURLY_DEF[S.cur];
      else if(q.quickPicks&&q.quickPicks.length) ninput.placeholder=fmtPill(q.quickPicks[Math.floor(q.quickPicks.length/2)],false);
    }

    ninput.addEventListener('input',e=>{
      let v=parseFloat(e.target.value);
      if(isNaN(v)){S.inp[q.id]='';return;}
      if(q.max!==undefined&&v>q.max)v=q.max;
      if(q.min!==undefined&&v<q.min)v=q.min;
      S.inp[q.id]=v;
      document.querySelectorAll('.quiz-pill').forEach(p=>{
        p.classList.toggle('sel',parseFloat(p.dataset.val)===v);
      });
      const em=document.getElementById('quiz-err-msg');
      if(em){em.textContent='';em.classList.remove('visible');}
    });

    const unitWrap=el('div','quiz-nunit');
    const arrCol=el('div','quiz-narr-col');
    const upBtn=el('button','quiz-narr');upBtn.innerHTML='&#9650;';upBtn.type='button';
    upBtn.onclick=e=>{
      e.stopPropagation();
      let v=parseFloat(ninput.value)||0;v+=(q.inpStep||1);
      if(q.max!==undefined&&v>q.max)v=q.max;
      ninput.value=v;S.inp[q.id]=v;
      document.querySelectorAll('.quiz-pill').forEach(p=>p.classList.toggle('sel',parseFloat(p.dataset.val)===v));
    };
    const dnBtn=el('button','quiz-narr');dnBtn.innerHTML='&#9660;';dnBtn.type='button';
    dnBtn.onclick=e=>{
      e.stopPropagation();
      let v=parseFloat(ninput.value)||0;v-=(q.inpStep||1);
      if(q.min!==undefined&&v<q.min)v=q.min;
      ninput.value=v;S.inp[q.id]=v;
      document.querySelectorAll('.quiz-pill').forEach(p=>p.classList.toggle('sel',parseFloat(p.dataset.val)===v));
    };
    arrCol.appendChild(upBtn);arrCol.appendChild(dnBtn);

    const lblsWrap=el('div','quiz-nulbls');
    unitParts.forEach(part=>{
      lblsWrap.appendChild(tx('span','quiz-nulbl',part));
    });

    unitWrap.appendChild(arrCol);unitWrap.appendChild(lblsWrap);
    nbox.appendChild(ninput);nbox.appendChild(unitWrap);
    content.appendChild(nbox);
    content.appendChild(errMsg);

    const picks=isHourly?HOURLY_QUICK[S.cur]:(q.quickPicks||[]);
    if(picks.length>0){
      const pillRow=el('div','quiz-pills');
      picks.forEach(v=>{
        const pill=el('button','quiz-pill');
        pill.type='button';pill.dataset.val=v;
        pill.textContent=fmtPill(v,isHourly);
        const curV=parseFloat(S.inp[q.id]);
        if(!isNaN(curV)&&curV===v)pill.classList.add('sel');
        pill.onclick=()=>{
          ninput.value=v;S.inp[q.id]=v;
          document.querySelectorAll('.quiz-pill').forEach(p=>p.classList.toggle('sel',parseFloat(p.dataset.val)===v));
          const em=document.getElementById('quiz-err-msg');
          if(em){em.textContent='';em.classList.remove('visible');}
          ninput.focus();
        };
        pillRow.appendChild(pill);
      });
      content.appendChild(pillRow);
    }
  }

  const btnRow=el('div','quiz-btn-row');
  if(S.step>0){
    const backBtn=el('button','quiz-back-btn-inline');
    backBtn.type='button';backBtn.innerHTML='&#8592; Back';
    backBtn.onclick=()=>{S.step--;S.err='';render();};
    btnRow.appendChild(backBtn);
  }
  const confirmBtn=el('button','quiz-confirm-btn');
  confirmBtn.type='button';
  const isLast=(S.step===QS.length-1);
  confirmBtn.innerHTML=isLast
    ? 'Calculate ROI <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'
    : 'Continue <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  confirmBtn.onclick=()=>tryAdvance();
  btnRow.appendChild(confirmBtn);
  content.appendChild(btnRow);
  card.appendChild(content);
  segsWrap.appendChild(card);
  page.appendChild(segsWrap);

  setTimeout(()=>{
    const inp=document.getElementById('quiz-number-input');
    if(inp)inp.focus();
  },80);

  return page;
}

function tryAdvance(){
  const q=QS[S.step];
  if(q.type==='sector'){
    if(!S.inp.segment){
      S.err='Please select your industry.';
      const em=document.getElementById('quiz-err-msg');
      if(em){em.textContent=S.err;em.classList.add('visible');}
      return;
    }
  } else {
    const val=S.inp[q.id];
    const hasVal=(val!==''&&val!==null&&val!==undefined&&!isNaN(parseFloat(String(val))));
    if(!hasVal){
      S.err='Please enter a value to continue.';
      const em=document.getElementById('quiz-err-msg');
      if(em){em.textContent=S.err;em.classList.add('visible');}
      const nbox=document.querySelector('.quiz-nbox');if(nbox)nbox.classList.add('has-err');
      return;
    }
  }
  S.err='';
  if(S.step===QS.length-1){
    const tix=parseFloat(S.inp.monthlyTickets)||0;
    const usr=Math.max(1,parseFloat(S.inp.users)||350);
    S.inp.ticketRatio=Math.max(0.1,Math.min(tix>0?tix/usr:0.5,5));
    S.phase='results';render();
  } else {
    S.step++;render();
  }
}

      .forEach(x=>{const td=document.createElement('td');td.textContent=x.v;if(x.c)td.className=x.c;tr.appendChild(td);});

  addSection('Shift-Left / Channel');

  addSection('License & Asset Management');
  addRow('License waste / year',fmt(r.licWaste),fmt(r.licWasteAfter),fmt(r.licWaste-r.licWasteAfter)+' saved',true,false);
  if(r.endpts>0&&r.itamSavings>0){
    const totalDev=r.endpts*r.annualDeviceCost;
    addRow('ITAM device savings ('+r.endpts+' devices)',fmt(totalDev),fmt(totalDev-r.itamSavings),fmt(r.itamSavings)+' saved',true,false);
  }
  if(r.invSavings>0)addRow('Inventory labor / year','(manual)',fmt(r.invSavings),fmt(r.invSavings)+' saved',true,false);
  const jmlLabel='JML Automation'+(r.onboardingIsAuto?' ('+r.onboardingVolume+' hires est.)':' ('+r.onboardingVolume+' hires)');
  addSection(jmlLabel,'section-jml');

  }

}

// ── PDF TEMPLATE BACKGROUND ──────────────────────────────────────────────────
// Předloha: template.pdf ve stejné složce jako index.html
// Načítá se přes pdf.js, vykreslí se jako pozadí každé strany reportu.
const PDF_TEMPLATE_URL = 'template.pdf';
let _templateCache = null;

async function loadTemplateBackgrounds() {
  if (_templateCache !== null) return _templateCache;
  if (!window.pdfjsLib) { _templateCache = []; return _templateCache; }
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdfDoc = await pdfjsLib.getDocument(PDF_TEMPLATE_URL).promise;
    const out = [];
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const pg = await pdfDoc.getPage(i);
      const vp = pg.getViewport({ scale: (794 * 2) / pg.getViewport({ scale: 1 }).width });
      const cnv = document.createElement('canvas');
      cnv.width = Math.round(vp.width);
      cnv.height = Math.round(vp.height);
      await pg.render({ canvasContext: cnv.getContext('2d'), viewport: vp }).promise;
      out.push(cnv.toDataURL('image/jpeg', 0.93));
    }
    _templateCache = out;
  } catch (err) {
    console.warn('template.pdf se nepodařilo načíst:', err);
    _templateCache = [];
  }
  return _templateCache;
}

  foot.appendChild(tx('div','pdf-foot-page',pageNum+' / '+totalPages));

    // Sestavit stránky BEZ bg img (pozadí přidáme ručně na canvas)
    const contentPages=[p1,p2,p3];
    const pages=contentPages.map((c,i)=>mkPdfPage(i+1,3,c,null));
    pages.forEach(pg=>stage.appendChild(pg));
    await new Promise(res=>setTimeout(res,150));

    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
    const PW=pdf.internal.pageSize.getWidth();   // 595.28 pt
    const PH=pdf.internal.pageSize.getHeight();  // 841.89 pt
    const PX=2; // scale pro html2canvas obsahu

    for(let i=0;i<pages.length;i++){
      // 1) Výstupní canvas pro celou stránku
      const out=document.createElement('canvas');
      out.width=Math.round(PW*PX);
      out.height=Math.round(PH*PX);
      const ctx=out.getContext('2d');

      // 2) Nakreslit pozadí z předlohy jako první vrstvu
      const bgSrc=bgFor(i);
      if(bgSrc){
        await new Promise(res=>{
          const bgImg=new Image();
          bgImg.onload=()=>{ ctx.drawImage(bgImg,0,0,out.width,out.height); res(); };
          bgImg.onerror=res;
          bgImg.src=bgSrc;
        });
      } else {
        ctx.fillStyle='#EAF0F8';
        ctx.fillRect(0,0,out.width,out.height);
      }

      // 3) Dočasně nastavit průhledné pozadí na .pdf-page pro html2canvas
      //    aby nepřekrylo předlohu
      const pageEl=pages[i];
      const origBg=pageEl.style.background;
      pageEl.style.background='transparent';
      // Skrýt .pdf-bg img pokud existuje (není potřeba, pozadí jsme nakreslili ručně)
      const bgEl=pageEl.querySelector('.pdf-bg');
      if(bgEl)bgEl.style.visibility='hidden';

      const contentCanvas=await html2canvas(pageEl,{
        scale:PX,
        backgroundColor:null,
        useCORS:true,
        logging:false,
        width:794,
        height:1123,
        ignoreElements:(el)=>el.classList&&el.classList.contains('pdf-bg'),
      });

      // Vrátit původní styly
      pageEl.style.background=origBg;
      if(bgEl)bgEl.style.visibility='';

      // 4) Překreslit obsah (průhledný) navrch předlohy
      ctx.drawImage(contentCanvas,0,0,out.width,out.height);

      // 5) Přidat do PDF
      const imgData=out.toDataURL('image/jpeg',0.95);
      if(i>0)pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,0,PW,PH);
      pdf.link(496.50, 727.95, 71.32, 12.44, { url: 'https://www.alvao.com/en/demo-alvao' });
    }

    pdf.save('ALVAO-ROI-Analysis.pdf');
    document.body.removeChild(stage);
  }catch(err){
    console.error('PDF export failed:',err);
    document.title='ALVAO ROI Analysis';window.print();
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML=oldHTML;}
  }
}

render();

</script>
</body>
</html>
